name: Scraper Deutschland

on:
  workflow_dispatch:
    inputs:
      cities:
        description: 'DE Regionen (de_nrw | de_bayern | de_berlin | de_bw | de_hessen | ...)'
        required: true
        default: 'de_berlin'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CI: true
          PYTHONUNBUFFERED: 1
          CITIES: ${{ inputs.cities }}
        run: python -u scraper_de.py
